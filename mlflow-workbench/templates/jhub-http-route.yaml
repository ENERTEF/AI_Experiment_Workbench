{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jhub-http-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.default_gateway.name }}
      namespace: {{ .Values.gateway.default_gateway.namespace }}
      sectionName: {{ .Values.gateway.default_gateway.https_listener }}
  hostnames:
    - {{ .Values.gateway.hostname}}
  rules:
{{- if .Values.gateway.expose_minio_console }}
    - matches:
      - path:
          type: PathPrefix
          value: /minio-console
      backendRefs:
        - name: {{ printf "%s-minio-obj-storage" .Release.Name}}
          port: {{ .Values.shared_values.minio_port}}
{{- end }}
{{- if .Values.gateway.expose_jhub}}
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: "proxy-public"
          port: 80
{{- end }}
{{- if .Values.gateway.expose_postgres}}
    - matches:
      - path:
          type: PathPrefix
          value: /pgsql
      backendRefs:
        - name: {{ printf "%s-pgsql-db" .Release.Name}}
          port: {{.Values.shared_values.postgres_port }}
{{- end }}
{{- end }}