apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      volumes:
        - name: auth-config
          secret:
            secretName: mlflow-auth-config
      containers:
      - name: mlflow-container
        image: ghcr.io/mlflow/mlflow:latest
        volumeMounts:
          - name: auth-config
            mountPath: /app/config/auth.ini
            readOnly: true
            subPath: auth.ini
        env:
          - name: MLFLOW_FLASK_SERVER_SECRET_KEY
            value: {{ randAlphaNum 32 | b64enc | quote }}
          - name: MLFLOW_AUTH_CONFIG_PATH
            value: "/app/config/auth.ini"
          - name: MLFLOW_LOGGING_LEVEL
            value: INFO
          - name: MLFLOW_S3_ENDPOINT_URL
            value: {{ printf "http://%s-minio-obj-storage:%d" .Release.Name (int .Values.mlflow.minio_port) | quote }}
          - name:	MLFLOW_SERVER_ALLOWED_HOSTS
            value: {{ printf "localhost:5000,mlflow-svc:5000,%s" .Values.expose.hostname }}
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: credentials
                key: minio-user
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: credentials
                key: minio-password
          - name: POSTGRES_URI
            valueFrom:
              secretKeyRef:
                name: credentials
                key: postgres-uri
        command: ["/bin/bash","-c"]
        args:
          - |
            pip install mlflow[auth]
            mlflow server \
              --app-name basic-auth \
              --host 0.0.0.0 \
              --port 5000 \
              --cors-allowed-origins "https://{{ .Values.expose.hostname }}" \
              --serve-artifacts \
              --enable-workspaces \
              --backend-store-uri $POSTGRES_URI \
              --artifacts-destination {{ printf "s3://%s" .Values.mlflow.minio_bucket | quote }}
