{{- if .Values.flower.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-client
  namespace: {{ .Release.Namespace }}
  labels:
    app: flower-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flower-client
  template:
    metadata:
      labels:
        app: flower-client
    spec:
      volumes:
        - name: certs-vol
          secret:
            secretName: {{ (include "flower.tls_secret_name" .) }}
            items:
              - key: ca.crt
                path: "ca.crt"
      containers:
        - name: supernode
          image: flwr/supernode:latest
          env:
            - name: FLWR_LOG_LEVEL
              value: INFO
          args: 
            - "--isolation"
            - "process"
            - "--clientappio-api-address"
            - "0.0.0.0:9094"
            - "--superlink"
            - {{ printf "%s" (include "flower.hub_superlink" .) | quote }}
            - "--root-certificates"
            - "/app/certs/ca.crt"
            - "--node-config"
            - {{ printf "dataset_tags=\"%s\"" (join "," .Values.flower.dataset_tags) | quote }}
          volumeMounts:
            - name: certs-vol
              mountPath: /app/certs
              readOnly: true
        - name: superexec
          image: soullessblob/flower-client:latest
          env:
            - name: FEDERATED_EXPERIMENT_ID
              value: {{ include "federated.experiment_id" . | quote}}
            - name: MLFLOW_WORKSPACE
              value: {{ include "federated.workspace_name" . | quote}}
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-svc:5000"
            - name: MLFLOW_TRACKING_USERNAME
              value: {{ .Values.flower.fed_username | quote }}
            - name: MLFLOW_TRACKING_PASSWORD
              value: {{ .Values.flower.fed_password | quote }}
          args: 
            - --insecure
            - --plugin-type
            - clientapp
            - --appio-api-address
            - 127.0.0.1:9094
{{- end }}