{{- if not .Values.auth.external.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak
        args: ["start-dev", "--import-realm"]
        env:
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              name: credentials
              key: keycloak-admin-username
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: credentials
              key: keycloak-admin-password
        - name: KC_HTTP_RELATIVE_PATH
          value: "/auth"
        - name: KC_HOSTNAME_PATH
          value: "/auth"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: realm-import
          mountPath: /opt/keycloak/data/import/mlflow-workbench-realm.json
          subPath: mlflow-workbench-realm.json
      volumes:
      - name: realm-import
        configMap:
          name: keycloak-realm-import
{{- end }}