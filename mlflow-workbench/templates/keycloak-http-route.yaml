{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kc-http-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.default_gateway.name }}
      namespace: {{ .Values.gateway.default_gateway.namespace }}
      sectionName: {{ .Values.gateway.default_gateway.https_listener }}
  hostnames:
    - {{ printf "keycloak.%s" .Values.gateway.hostname}}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
        - name: {{ printf "%s-keycloak" .Release.Name}}
          port: 8080
{{- end }}