apiVersion: v2
name: mlflow-workbench
description: A Helm chart for Kubernetes
type: application
version: 0.1.0
appVersion: "1.16.0"
dependencies:
  - name: minio
    version: "0.5.7"
    repository: "oci://registry-1.docker.io/cloudpirates"
    alias: minio-obj-storage
  
  - name: postgres
    version: "0.13.2"
    repository: "oci://registry-1.docker.io/cloudpirates"
    alias: pgsql-db
  
  - name: jupyterhub
    version: "4.3.1"
    repository: "https://jupyterhub.github.io/helm-chart"
    alias: jhub_central